services:
  binance_bot:
    build: .
    container_name: binance_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import time,os; exit(0 if os.path.exists('logs/.alive') and time.time()-os.path.getmtime('logs/.alive')<300 else 1)"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
